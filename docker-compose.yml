services:
  traefik:
    image: traefik:v3.6
    restart: always


    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=appnet"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--certificatesresolvers.letsencrypt.acme.email=admin@hire.mn"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
#      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - /home/dorjoo/api/dynamic.yml:/etc/traefik/dynamic.yml
    networks:
      - appnet
  pgbouncer:
    image: edoburu/pgbouncer
    restart: always
    environment:
      DB_HOST: postgres
      DB_USER: hire
      DB_PASSWORD: dorjooX0
      DB_NAME: hire
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,statement_timeout
      LISTEN_ADDR: 0.0.0.0
      LISTEN_PORT: 6432
    networks:
      - appnet

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: hire
      POSTGRES_USER: hire
      POSTGRES_PASSWORD: dorjooX0
    command: >
      postgres
      -c shared_buffers=4GB
      -c work_mem=8MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=12GB
      -c max_connections=200
      -c max_worker_processes=16
      -c max_parallel_workers=8
      -c max_parallel_workers_per_gather=2
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
  redis:
    image: redis:7
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    networks:
      - appnet

  core:
    image: ghcr.io/dorjoohover/hire_backend_core:main
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.hire.mn`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
     # - "traefik.http.services.api.loadbalancer.serverstransport=api-transport"
      - "traefik.http.services.api.loadbalancer.serverstransport=api-transport@file"
     # - "traefik.http.serverstransports.api-transport.forwardingtimeouts.dialtimeout=30s"
    #  - "traefik.http.serverstransports.api-transport.forwardingtimeouts.responseheadertimeout=60s"
#      - "traefik.http.serverstransports.api-transport.forwardingtimeouts.idletimeout=120s"
    networks:
      - appnet
    volumes:
      - /var/lib/hire/uploads:/app/uploads:rw
      - /var/log/hire/report:/app/logs:rw
  pgbackup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: hire
      POSTGRES_USER: hire
      POSTGRES_PASSWORD: dorjooX0
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - pgbackup:/backups
    depends_on:
      - postgres
    networks:
      - appnet
volumes:
  pgdata:
  redisdata:
  pgbackup:
  letsencrypt:
networks:
  appnet:
    external: true

